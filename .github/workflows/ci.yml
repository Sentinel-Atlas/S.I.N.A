name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  install-and-build:
    name: Install & Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=app/backend

      - name: Build frontend
        run: npm run build --workspace=app/frontend

  typecheck:
    name: Type Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck --workspace=app/backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace=app/frontend
